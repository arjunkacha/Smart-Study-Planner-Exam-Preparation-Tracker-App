name: smart_study_planner
description: Smart Study Planner & Exam Preparation Tracker - A complete offline-first Flutter application for students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.7

  # UI & Charts
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Connectivity
  connectivity_plus: ^6.0.3

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
